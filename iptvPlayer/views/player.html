// Integra los canales MPD a las categorías
function integrarCanalesMpd() {
    // Agregar los canales MPD en una categoría llamada "Canales MPD"
    const categoriaMpd = {
        nombre: "Canales MPD",
        canales: Object.keys(canalesMpd).map(key => ({
            nombre: key,
            video: canalesMpd[key].url,
            k1: canalesMpd[key].k1,
            k2: canalesMpd[key].k2,
            logo: "", // Si no tienes logos, puedes poner una imagen predeterminada
        }))
    };

    // Agregar esta nueva categoría a las categorías existentes
    categorias.push(categoriaMpd);
  //  categorias  .push({"nombre":"Canales MPD", "canales":canalesMpd});
   // generarTabs();  // Volver a generar las pestañas de categorías
   // generarLista(); // Volver a generar la lista de canales
}

// Llamamos a esta función cuando cargue la página



window.addEventListener('load', function() {
    console.log('Page and all resources fully loaded!');
    let m3uUrl = localStorage.getItem('m3uUrl');
    m3uUrl="http://127.0.0.1:8080/listas/unicalista.m3u";
    if (m3uUrl) {
        fetchM3U(m3uUrl);
    } else {
        m3uUrl = prompt("Ingresa la URL del archivo M3U:");
        if (m3uUrl) {
            localStorage.setItem('m3uUrl', m3uUrl);
            fetchM3U(m3uUrl);
        }
    }

    async function fetchM3U(url) {
        const response = await fetch(url);
        const m3uText = await response.text();
        const canales = [];
        const lines = m3uText.split('\n');
        let currentCategory = null;
        let categoriasMap = {};

        lines.forEach(line => {
            if (line.startsWith('#EXTINF:')) {
                const parts = line.split(',');
                const title = parts[1].trim();
                const groupTitle = line.match(/group-title="([^"]+)"/);
                const logo = line.match(/tv-logo="([^"]+)"/);
                const video = lines[lines.indexOf(line) + 1].trim();
                const canal = {
                    nombre: title,
                    video: video,
                    logo: logo ? logo[1] : '',
                };

                const category = groupTitle ? groupTitle[1] : 'General';
                if (!categoriasMap[category]) {
                    categoriasMap[category] = [];
                }
                categoriasMap[category].push(canal);
            }
        });

        categorias = Object.keys(categoriasMap).map(category => ({
            nombre: category,
            canales: categoriasMap[category]
        }));
        integrarCanalesMpd();
        const todosCanales = [];
        categorias.forEach(cat => todosCanales.push(...cat.canales));
        categorias.unshift({
            nombre: "Todos",
            canales: todosCanales,
        });

        generarTabs();
        generarLista();

        const ultimoCanal = JSON.parse(localStorage.getItem('ultimoCanal'));
        if (ultimoCanal) {
            categoriaActual = ultimoCanal.categoria;
            canalSeleccionado = ultimoCanal.canal;
        } else {
            categoriaActual = 0;
            canalSeleccionado = 0;
        }

        changeChannel();
    }
});

let categoriaActual = 0;
let canalSeleccionado = 0;
let panelVisible = false;
let overlayTimeout, inactivityTimer, numberBuffer = "", numberTimer;

function generarTabs() {
    categoryTabs.innerHTML = "";
    categorias.forEach((cat, i) => {
        const tab = document.createElement("div");
        tab.className = "category-tab" + (i === categoriaActual ? " active" : "");
        tab.textContent = cat.nombre;
        tab.onclick = function() {
            categoriaActual = i;  // Cambiar el canal seleccionado
            updateSelection();
            changeChannel();         // Cambiar al canal seleccionado
            generarLista();          // Volver a generar la lista para actualizar el estado
        };
        categoryTabs.appendChild(tab);
    });
}

function generarLista() {
    list.innerHTML = "";
    categorias[categoriaActual].canales.forEach((canal, i) => {
        const div = document.createElement("div");
        div.className = "channel-item" + (i === canalSeleccionado ? " selected" : "");
        div.innerHTML = `<img src="${canal.logo}">${canal.nombre}`;
        // Agregar el evento onclick
        div.onclick = function() {
            canalSeleccionado = i;  // Cambiar el canal seleccionado
            changeChannel();         // Cambiar al canal seleccionado
            generarLista();          // Volver a generar la lista para actualizar el estado
        };
        list.appendChild(div);
    });
}

function updateSelection() {
    document.querySelectorAll(".channel-item").forEach((ch, i) =>
        ch.classList.toggle("selected", i === canalSeleccionado)
    );
    document.querySelectorAll(".category-tab").forEach((t, i) =>
        t.classList.toggle("active", i === categoriaActual)
    );
    document.querySelectorAll(".channel-item")[canalSeleccionado]?.scrollIntoView({
        block: "nearest",
        behavior: "smooth"
    });
    // Desplazamos la categoría seleccionada en la barra de categorías
    document.querySelectorAll(".category-tab")[categoriaActual]?.scrollIntoView({
        inline: "center", // Esto centra la categoría seleccionada en la vista
        behavior: "smooth" // Desplazamiento suave
    });
}

function changeChannel() {
    const canal = categorias[categoriaActual].canales[canalSeleccionado];
    playVideo(canal.video, canal.live,canal.k1,canal.k2);
    showOverlay(canal.nombre, canal.programa, canal.logo);
    localStorage.setItem('ultimoCanal', JSON.stringify({
        categoria: categoriaActual,
        canal: canalSeleccionado
    }));
}

function showOverlay(nombre, programa, logo) {
    overlayLogo.src = logo;
    overlayChannel.textContent = nombre;
    overlayProgram.textContent = programa;
    overlay.classList.remove("hidden");

    clearTimeout(overlayTimeout);
    overlayTimeout = setTimeout(() => {
        overlay.classList.add("hidden");
    }, 4000);
}

function updateTime() {
    const now = new Date();
    timeLabel.textContent = now.toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit'
    });
}
setInterval(updateTime, 1000);
updateTime();

let player="";
function playVideo(url, isLive = false, k1 = "", k2 = "") {
    if (hls) {
        hls.destroy();
    }
 
      var sources = [];
      if (player)
        player.remove();
    // Verificar si el canal es MPD
    // Verificar si el canal es MPD
    if (url.includes('.mpd') && k1 && k2) {
        sources.push({
            file: url,
            drm: {"clearkey": {"keyId": k1, "key": k2}}
        });
        player =jwplayer("tv-video").setup({
        playlist: [{
            sources: sources
        }],
        autostart: true,
        width: "100%", 
        height: "100%", 
        stretching: "exactfit",
        aspectratio: "16:9",
        cast: {}, 
                sharing: {}
        });
    } else if (Hls.isSupported()) {
        // Si no es MPD, usamos HLS.js (para canales M3U)
        hls = new Hls();
        hls.on(Hls.Events.ERROR, function(event, data) {
            console.error("HLS.js error", data);
        });

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            console.log('Manifiesto analizado correctamente');
            video.play();
        });

        video.addEventListener('canplay', () => {
            console.log('El video está listo para reproducir');
            video.play();
        });

        hls.loadSource(url);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
    }
}

function resetInactivityTimer() {
    clearTimeout(inactivityTimer);
    if (panelVisible) {
        inactivityTimer = setTimeout(() => {
            panelVisible = false;
            panel.classList.remove("visible");
        }, 5000);
    }
}

document.addEventListener("keydown", (e) => {
    e.preventDefault();
    e.stopPropagation();

    resetInactivityTimer();

    let key = e.key;
    let code = e.keyCode || e.which;

    switch (key) {
        case "ArrowLeft":
            if (!panelVisible) {
                panelVisible = true;
                panel.classList.add("visible");
            } else {
                categoriaActual = (categoriaActual - 1 + categorias.length) % categorias.length;
                canalSeleccionado = 0;
                generarTabs();
                generarLista();
            }
            break;

        case "ArrowRight":
            if (panelVisible) {
                categoriaActual = (categoriaActual + 1) % categorias.length;
                canalSeleccionado = 0;
                generarTabs();
                generarLista();
            }
            break;

        case "ArrowUp":
            canalSeleccionado = (canalSeleccionado - 1 + categorias[categoriaActual].canales.length) % categorias[categoriaActual].canales.length;
            updateSelection();
            if (!panelVisible) changeChannel();
            break;

        case "ArrowDown":
            canalSeleccionado = (canalSeleccionado + 1) % categorias[categoriaActual].canales.length;
            updateSelection();
            if (!panelVisible) changeChannel();
            break;

        case "Enter":
            changeChannel();
            break;

        case "Backspace":
        case "Escape":
            panelVisible = false;
            panel.classList.remove("visible");
            overlay.classList.add("hidden");
            break;
    }
    updateSelection();
});

let touchStartX = 0;
let touchStartY = 0;
let touchEndX = 0;
let touchEndY = 0;

document.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
});

document.addEventListener("touchend", (e) => {
    touchEndX = e.changedTouches[0].screenX;
    touchEndY = e.changedTouches[0].screenY;
    handleGesture();
});

function handleGesture() {
    const dx = touchEndX - touchStartX;
    const dy = touchEndY - touchStartY;

    const minSwipeDistance = 50; 

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > minSwipeDistance) {
            if (panelVisible) {
                categoriaActual = (categoriaActual + 1) % categorias.length;
                canalSeleccionado = 0;
                generarTabs();
                generarLista();
            }
        } else if (dx < -minSwipeDistance) {
            if (!panelVisible) {
                panelVisible = true;
                panel.classList.add("visible");
            } else {
                categoriaActual = (categoriaActual - 1 + categorias.length) % categorias.length;
                canalSeleccionado = 0;
                generarTabs();
                generarLista();
            }
        }
    } else {
        if (dy > minSwipeDistance) {
            canalSeleccionado = (canalSeleccionado + 1) % categorias[categoriaActual].canales.length;
            updateSelection();
            if (!panelVisible) changeChannel();
        } else if (dy < -minSwipeDistance) {
            canalSeleccionado = (canalSeleccionado - 1 + categorias[categoriaActual].canales.length) % categorias[categoriaActual].canales.length;
            updateSelection();
            if (!panelVisible) changeChannel();
        }
    }
}

// Escuchar el mensaje en el iframe
window.addEventListener('message', function(event) {
    // Verificar que el mensaje provenga de un origen confiable (seguridad)
    if (event.origin !== 'http://127.0.0.1:8080') {
        console.error('Mensaje recibido de un origen no seguro:', event.origin);
       // return;
    }

     // Obtener el mensaje recibido
    const mensaje = event.data;

    // Verificar que el mensaje es de tipo 'keydown'
    if (mensaje.type === 'keydown') {
        // Crear un evento 'keypress' con el valor de la tecla
        const keyEvent = new KeyboardEvent('keydown', {
            key: mensaje.key, // La tecla que se recibe del mensaje
            code: mensaje.key, // Usamos el mismo valor para 'code' y 'key' por simplicidad
            keyCode: mensaje.key.charCodeAt(0), // Obtiene el código de la tecla
            which: mensaje.key.charCodeAt(0),  // También lo usamos como 'which'
            bubbles: true, // Permitir que el evento burbujee
            cancelable: true // Permitir que el evento sea cancelable
        });

        // Disparar el evento 'keypress' en el iframe
        document.dispatchEvent(keyEvent);  // Disparar el evento en el documento
    }

    // Realiza acciones con el mensaje (puedes modificar el DOM o ejecutar alguna lógica)
});
